<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MagicMirror Admin</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
      }

      .container {
        background: white;
        border-radius: 10px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        padding: 40px;
        max-width: 600px;
        width: 100%;
      }

      h1 {
        color: #333;
        margin-bottom: 30px;
        text-align: center;
      }

      .form-group {
        margin-bottom: 20px;
      }

      label {
        display: block;
        margin-bottom: 8px;
        color: #555;
        font-weight: 500;
      }

      input[type="text"],
      input[type="number"],
      select {
        width: 100%;
        padding: 12px;
        border: 2px solid #e0e0e0;
        border-radius: 5px;
        font-size: 16px;
        transition: border-color 0.3s;
      }

      input[type="text"]:focus,
      input[type="number"]:focus,
      select:focus {
        outline: none;
        border-color: #667eea;
      }

      .toggle-group {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .toggle-switch {
        position: relative;
        width: 50px;
        height: 26px;
      }

      .toggle-switch input {
        opacity: 0;
        width: 0;
        height: 0;
      }

      .slider {
        position: absolute;
        cursor: pointer;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background-color: #ccc;
        transition: 0.4s;
        border-radius: 26px;
      }

      .slider:before {
        position: absolute;
        content: "";
        height: 20px;
        width: 20px;
        left: 3px;
        bottom: 3px;
        background-color: white;
        transition: 0.4s;
        border-radius: 50%;
      }

      input:checked + .slider {
        background-color: #667eea;
      }

      input:checked + .slider:before {
        transform: translateX(24px);
      }

      button {
        width: 100%;
        padding: 14px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        border-radius: 5px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition:
          transform 0.2s,
          box-shadow 0.2s;
      }

      button:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
      }

      button:active {
        transform: translateY(0);
      }

      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
        transform: none;
      }

      .message {
        margin-top: 20px;
        padding: 12px;
        border-radius: 5px;
        text-align: center;
        display: none;
      }

      .message.success {
        background-color: #d4edda;
        color: #155724;
        border: 1px solid #c3e6cb;
      }

      .message.error {
        background-color: #f8d7da;
        color: #721c24;
        border: 1px solid #f5c6cb;
      }

      .loading {
        text-align: center;
        color: #666;
        margin-top: 20px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>MagicMirror Admin</h1>
      <form id="adminForm">
        <div class="form-group">
          <label>Traffic Module</label>
          <div class="toggle-group">
            <label class="toggle-switch">
              <input type="checkbox" id="enabled" checked />
              <span class="slider"></span>
            </label>
            <span id="enabledLabel">Enabled</span>
          </div>
        </div>

        <div class="form-group">
          <label for="destination">Destination</label>
          <input type="text" id="destination" placeholder="Enter destination address" required />
        </div>

        <div class="form-group">
          <label for="trafficModel">Traffic Model</label>
          <select id="trafficModel">
            <option value="BEST_GUESS">BEST_GUESS</option>
            <option value="PESSIMISTIC">PESSIMISTIC</option>
            <option value="OPTIMISTIC">OPTIMISTIC</option>
          </select>
        </div>

        <div class="form-group">
          <label for="updateInterval">Update Interval (minutes)</label>
          <input type="number" id="updateInterval" min="1" value="5" required />
        </div>

        <div class="form-group">
          <label>Avoid Options</label>
          <div style="display: flex; flex-direction: column; gap: 10px; margin-top: 8px;">
            <label style="display: flex; align-items: center; gap: 8px; font-weight: normal;">
              <input type="checkbox" id="avoidTolls" value="TOLLS" />
              <span>Avoid Tolls</span>
            </label>
            <label style="display: flex; align-items: center; gap: 8px; font-weight: normal;">
              <input type="checkbox" id="avoidHighways" value="HIGHWAYS" />
              <span>Avoid Highways</span>
            </label>
            <label style="display: flex; align-items: center; gap: 8px; font-weight: normal;">
              <input type="checkbox" id="avoidFerries" value="FERRIES" />
              <span>Avoid Ferries</span>
            </label>
            <label style="display: flex; align-items: center; gap: 8px; font-weight: normal;">
              <input type="checkbox" id="avoidIndoor" value="INDOOR" />
              <span>Avoid Indoor</span>
            </label>
          </div>
        </div>

        <div class="form-group">
          <label>Scheduler</label>
          <div class="toggle-group">
            <label class="toggle-switch">
              <input type="checkbox" id="schedulerEnabled" />
              <span class="slider"></span>
            </label>
            <span id="schedulerEnabledLabel">Disabled</span>
          </div>
        </div>

        <div id="schedulerSettings" style="display: none;">
          <div class="form-group">
            <label for="schedulerMode">Scheduler Mode</label>
            <select id="schedulerMode">
              <option value="timeRange">Time Range (Enable/Disable Times)</option>
              <option value="duration">Duration (Enable for X minutes)</option>
            </select>
          </div>

          <div id="timeRangeSettings">
            <div class="form-group">
              <label for="enableTime">Enable Time</label>
              <input type="time" id="enableTime" value="08:00" />
            </div>

            <div class="form-group">
              <label for="disableTime">Disable Time</label>
              <input type="time" id="disableTime" value="18:00" />
            </div>
          </div>

          <div id="durationSettings" style="display: none;">
            <div class="form-group">
              <label for="enableTimeDuration">Enable Time</label>
              <input type="time" id="enableTimeDuration" value="08:00" />
            </div>

            <div class="form-group">
              <label for="enabledDuration">Enabled Duration (minutes)</label>
              <input type="number" id="enabledDuration" min="1" value="90" />
            </div>
          </div>
        </div>

        <button type="submit" id="saveButton">Save Configuration</button>
      </form>

      <div id="message" class="message"></div>
      <div id="loading" class="loading" style="display: none;">Loading...</div>
    </div>

    <script>
      // Load current configuration
      async function loadConfig() {
        try {
          document.getElementById("loading").style.display = "block";
          const response = await fetch("/admin/api/config/traffic");
          const data = await response.json();

          if (data.success) {
            document.getElementById("enabled").checked = data.config.enabled;
            document.getElementById("enabledLabel").textContent = data.config.enabled ? "Enabled" : "Disabled";
            document.getElementById("destination").value = data.config.destination || "";
            document.getElementById("trafficModel").value = data.config.trafficModel || "BEST_GUESS";
            document.getElementById("updateInterval").value = data.config.updateInterval / (60 * 1000) || 5;

            // Load avoid options
            const avoid = data.config.avoid || [];
            document.getElementById("avoidTolls").checked = avoid.includes("TOLLS");
            document.getElementById("avoidHighways").checked = avoid.includes("HIGHWAYS");
            document.getElementById("avoidFerries").checked = avoid.includes("FERRIES");
            document.getElementById("avoidIndoor").checked = avoid.includes("INDOOR");

            // Load scheduler settings
            const schedulerEnabled = data.config.schedulerEnabled || false;
            document.getElementById("schedulerEnabled").checked = schedulerEnabled;
            document.getElementById("schedulerEnabledLabel").textContent = schedulerEnabled ? "Enabled" : "Disabled";
            document.getElementById("schedulerSettings").style.display = schedulerEnabled ? "block" : "none";

            const schedulerMode = data.config.schedulerMode || "timeRange";
            document.getElementById("schedulerMode").value = schedulerMode;
            if (schedulerMode === "duration") {
              document.getElementById("timeRangeSettings").style.display = "none";
              document.getElementById("durationSettings").style.display = "block";
            } else {
              document.getElementById("timeRangeSettings").style.display = "block";
              document.getElementById("durationSettings").style.display = "none";
            }

            document.getElementById("enableTime").value = data.config.enableTime || "08:00";
            document.getElementById("disableTime").value = data.config.disableTime || "";
            document.getElementById("enableTimeDuration").value = data.config.enableTime || "08:00";
            document.getElementById("enabledDuration").value = data.config.enabledDuration || 90;
          } else {
            showMessage("Error loading configuration: " + (data.error || "Unknown error"), "error");
          }
        } catch (error) {
          showMessage("Failed to load configuration: " + error.message, "error");
        } finally {
          document.getElementById("loading").style.display = "none";
        }
      }

      // Update enabled label
      document.getElementById("enabled").addEventListener("change", function () {
        document.getElementById("enabledLabel").textContent = this.checked ? "Enabled" : "Disabled";
      });

      // Update scheduler enabled label and show/hide settings
      document.getElementById("schedulerEnabled").addEventListener("change", function () {
        const enabled = this.checked;
        document.getElementById("schedulerEnabledLabel").textContent = enabled ? "Enabled" : "Disabled";
        document.getElementById("schedulerSettings").style.display = enabled ? "block" : "none";
      });

      // Handle scheduler mode change
      document.getElementById("schedulerMode").addEventListener("change", function () {
        const mode = this.value;
        if (mode === "duration") {
          document.getElementById("timeRangeSettings").style.display = "none";
          document.getElementById("durationSettings").style.display = "block";
        } else {
          document.getElementById("timeRangeSettings").style.display = "block";
          document.getElementById("durationSettings").style.display = "none";
        }
      });

      // Handle form submission
      document.getElementById("adminForm").addEventListener("submit", async function (e) {
        e.preventDefault();

        const enabled = document.getElementById("enabled").checked;
        const destination = document.getElementById("destination").value;
        const trafficModel = document.getElementById("trafficModel").value;
        const updateInterval = parseInt(document.getElementById("updateInterval").value) * 60 * 1000;

        // Collect avoid options
        const avoid = [];
        if (document.getElementById("avoidTolls").checked) avoid.push("TOLLS");
        if (document.getElementById("avoidHighways").checked) avoid.push("HIGHWAYS");
        if (document.getElementById("avoidFerries").checked) avoid.push("FERRIES");
        if (document.getElementById("avoidIndoor").checked) avoid.push("INDOOR");

        const schedulerEnabled = document.getElementById("schedulerEnabled").checked;
        const schedulerMode = document.getElementById("schedulerMode").value;
        const enableTime = schedulerMode === "duration" ? document.getElementById("enableTimeDuration").value : document.getElementById("enableTime").value;
        let disableTime = document.getElementById("disableTime").value;
        const enabledDuration = parseInt(document.getElementById("enabledDuration").value) || 90;

        // Calculate disableTime if not set (enableTime + 90 minutes)
        if (!disableTime && enableTime && schedulerMode === "timeRange") {
          const enableParts = enableTime.split(":");
          if (enableParts.length === 2) {
            const hours = parseInt(enableParts[0], 10);
            const minutes = parseInt(enableParts[1], 10);
            if (!isNaN(hours) && !isNaN(minutes)) {
              let totalMinutes = hours * 60 + minutes + 90;
              if (totalMinutes >= 24 * 60) {
                totalMinutes = totalMinutes % (24 * 60);
              }
              const disableHours = Math.floor(totalMinutes / 60);
              const disableMinutes = totalMinutes % 60;
              disableTime = `${String(disableHours).padStart(2, "0")}:${String(disableMinutes).padStart(2, "0")}`;
            }
          }
        }

        const config = {
          enabled: enabled,
          destination: destination,
          trafficModel: trafficModel,
          updateInterval: updateInterval,
          avoid: avoid,
          schedulerEnabled: schedulerEnabled,
          schedulerMode: schedulerMode,
          enableTime: enableTime,
          disableTime: disableTime,
          enabledDuration: enabledDuration
        };

        try {
          document.getElementById("saveButton").disabled = true;
          document.getElementById("saveButton").textContent = "Saving...";

          const response = await fetch("/admin/api/config/traffic", {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify(config)
          });

          const data = await response.json();

          if (data.success) {
            showMessage("Configuration saved successfully!", "success");
          } else {
            showMessage("Error saving configuration: " + (data.error || "Unknown error"), "error");
          }
        } catch (error) {
          showMessage("Failed to save configuration: " + error.message, "error");
        } finally {
          document.getElementById("saveButton").disabled = false;
          document.getElementById("saveButton").textContent = "Save Configuration";
        }
      });

      // Show message
      function showMessage(message, type) {
        const messageEl = document.getElementById("message");
        messageEl.textContent = message;
        messageEl.className = "message " + type;
        messageEl.style.display = "block";

        setTimeout(() => {
          messageEl.style.display = "none";
        }, 5000);
      }

      // Load config on page load
      loadConfig();
    </script>
  </body>
</html>
